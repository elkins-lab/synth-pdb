site_name: synth-pdb
site_url: https://elkins.github.io/synth-pdb
repo_url: https://github.com/elkins/synth-pdb
repo_name: elkins/synth-pdb
site_description: High-Performance Protein Structure Generator for AI/ML and Education
site_author: George Elkins
copyright: Copyright &copy; 2026 George Elkins

extra:
  version: v1.37.0

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette: 
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

