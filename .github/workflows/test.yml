name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        numpy-version: ["1.26.4", "2.2.0"]
        exclude:
          # NumPy 2.x requires Python >=3.9; 1.26.x is the last 1.x release
          # All our supported Pythons are >=3.10 here so no exclusions needed,
          # but keep the block for future-proofing.
          - python-version: "3.8"
            numpy-version: "2.2.0"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy==${{ matrix.numpy-version }}"
        pip install -e ".[dev]"

    - name: Check typing with mypy
      run: |
        mypy synth_pdb/

    - name: Lint with ruff
      run: |
        ruff check synth_pdb/

    - name: Run tests
      run: |
        pytest
