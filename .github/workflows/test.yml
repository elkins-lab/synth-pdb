name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        numpy-version: ["1.26.4", "2.2.6", "2.3.5"]
        exclude:
          # Python 3.10 and 3.11 are only tested with the stable 1.x branch (1.26.4)
          # to reduce CI load. 3.12 and 3.13 track the modern NumPy 2.x releases.
          - python-version: "3.10"
            numpy-version: "2.2.6"
          - python-version: "3.10"
            numpy-version: "2.3.5"
          - python-version: "3.11"
            numpy-version: "2.2.6"
          - python-version: "3.11"
            numpy-version: "2.3.5"
          - python-version: "3.12"
            numpy-version: "2.2.6"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy==${{ matrix.numpy-version }}"
        pip install -e ".[dev]"

    - name: Check typing with mypy
      run: |
        mypy synth_pdb/

    - name: Lint with ruff
      run: |
        ruff check synth_pdb/

    - name: Run tests with coverage
      run: |
        pytest --cov=synth_pdb --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
