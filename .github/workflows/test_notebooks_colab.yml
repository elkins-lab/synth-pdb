name: Test Notebooks

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test_notebooks:
    # Run on the standard runner — the Colab container's kernel sends
    # 'colab_request' IPython messages that require the Colab UI backend,
    # causing an immediate DeadKernelError when run headlessly.
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install package and notebook dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,plm,gnn,ai]"
        pip install jupyter nbconvert umap-learn matplotlib seaborn

    - name: Test Tutorials
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 docs/tutorials/*.ipynb

    - name: Test Interactive Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/interactive_tutorials/*.ipynb

    - name: Test ML Integration Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/ml_integration/*.ipynb

    - name: Test ML Loading Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/ml_loading/*.ipynb
