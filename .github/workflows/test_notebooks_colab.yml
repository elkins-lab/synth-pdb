name: Test Notebooks in Colab

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test_notebooks:
    runs-on: ubuntu-latest
    container: us-docker.pkg.dev/colab-images/public/cpu-runtime

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install local package
      run: |
        # pytest-nbmake is unavailable in the Colab container's pip index.
        # nbconvert is pre-installed in the Colab image, so we use it instead.
        pip install -e ".[dev,plm,gnn,ai]"
        pip install umap-learn matplotlib seaborn

    - name: Test Tutorials
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 docs/tutorials/*.ipynb

    - name: Test Interactive Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/interactive_tutorials/*.ipynb

    - name: Test ML Integration Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/ml_integration/*.ipynb

    - name: Test ML Loading Examples
      run: |
        jupyter nbconvert --to notebook --execute --output-dir=/tmp/nbout \
          --ExecutePreprocessor.timeout=600 examples/ml_loading/*.ipynb
